name: change-diff

# v2 Aenderungs-Erkennung: re-crawlt die kuratierten Quellseiten und vergleicht
# sie gegen die committete Fingerprint-Baseline (reports/fingerprints/<id>.json).
# Aendert sich eine Seite INHALTLICH (normalisiert, also nicht nur kosmetisch),
# ist das ein Hinweis, dass eine Re-Extraktion der Leistung noetig sein koennte.
#
# Statt den Job nur rot zu faerben, oeffnet/aktualisiert dieser Workflow EIN
# rollendes GitHub-Issue (dedupe ueber das Label "source-change") mit der
# Befundliste — so bleibt die Aenderung sichtbar und nachverfolgbar, ohne die
# Actions-Historie mit roten Laeufen zu fluten. Schliesst sich das Issue selbst,
# wenn beim naechsten Lauf nichts mehr offen ist.
#
# Tri-state (siehe docs/v1-pipeline.md): ein toter Link (404/410) oder eine
# inhaltliche Aenderung ist ein Befund; Block/Netzfehler/SPA sind Umgebung und
# werden nur geloggt (kein Issue). Ergaenzt link-rot.yml (Zitat-Drift) um die
# Erkennung JEDER Seitenaenderung (auch noch nicht zitierter, z.B. neuer Schritt).
#
# NETZ-POLICY: braucht ausgehendes HTTPS zu den Quelldomains. Ist die Policy zu,
# faellt alles als 'netzfehler'/'blockiert' an (kein Issue) und der Lauf ist No-op.

on:
  schedule:
    - cron: "0 7 * * 1" # woechentlich, Montag 07:00 UTC (nach link-rot)
  workflow_dispatch: {} # manueller Lauf

permissions:
  contents: read
  issues: write # fuer das Anlegen/Aktualisieren/Schliessen des Befund-Issues

jobs:
  change-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
      # Schlank: diff braucht httpx + trafilatura (SSR-Fetch wie der Crawl),
      # pyyaml (sources.yaml) und pydantic (config-Modelle) — kein crawl4ai/
      # playwright (kein Browser; diff nutzt nur den SSR-Pfad) oder pydantic-ai.
      # Versionen kommen aus der zentralen Lock-Datei constraints.txt (EINE
      # Wahrheitsquelle; Bumps bewusst als Commit, nicht implizit im Cron).
      - name: Laufzeit-Deps (schlank, exakt gepinnt via constraints.txt)
        run: python -m pip install --quiet -c constraints.txt httpx trafilatura pyyaml pydantic
      - name: Aenderungs-Diff (JSON, nur Leistungen mit Baseline)
        id: diff
        run: |
          shopt -s nullglob
          ids=()
          for f in reports/fingerprints/*.json; do
            ids+=( --id "$(basename "$f" .json)" )
          done
          if [ ${#ids[@]} -eq 0 ]; then
            echo "Keine Baselines in reports/fingerprints/ — nichts zu pruefen."
            echo "[]" > diff.json
            exit 0
          fi
          echo "Diffe Leistungen: ${ids[*]}"
          # --json -> stdout (maschinenlesbar); menschliche Zeilen -> stderr (Log).
          # Exit-Code (tot/Aenderung) NICHT den Step scheitern lassen — das Issue
          # ist der Kanal; der Report wird immer geschrieben.
          PYTHONPATH=src python -m tessera.cli diff --json "${ids[@]}" > diff.json || true
          echo "--- diff.json ---"; cat diff.json
      - name: Befund-Issue oeffnen / aktualisieren / schliessen
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let reports = [];
            try { reports = JSON.parse(fs.readFileSync('diff.json', 'utf8')); } catch (e) {}
            const LABEL = 'source-change';
            const TITLE = 'Quelländerung erkannt — Re-Extraktion prüfen';

            // Befunde: inhaltliche Aenderung oder toter Link (Umgebung ignorieren).
            const actionable = reports.filter(r => (r.changed && r.changed.length) || (r.dead && r.dead.length));

            // Bestehendes offenes Issue finden (dedupe ueber Label).
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: LABEL, per_page: 50,
            });
            const openIssue = existing.find(i => i.title === TITLE);

            if (actionable.length === 0) {
              if (openIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: openIssue.number,
                  body: `Automatischer Lauf ${new Date().toISOString()}: keine offenen Quelländerungen mehr — Issue wird geschlossen.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: openIssue.number,
                  state: 'closed', state_reason: 'completed',
                });
              }
              core.info('Keine Befunde.');
              return;
            }

            // Befund-Text bauen. Diff-Auszüge (baseline vs. live) zeigen, WAS
            // sich geändert hat; wird der Body zu lang (GitHub-Limit 65536),
            // wird ohne Auszüge neu gebaut.
            const buildBody = (withExcerpts) => {
              const lines = [
                'Der wöchentliche `change-diff`-Lauf hat Änderungen an offiziellen Quellseiten erkannt.',
                'Das heisst **nicht** automatisch, dass die extrahierten Daten falsch sind — es ist ein',
                'Hinweis, die betroffene Leistung neu zu extrahieren und den Diff zu prüfen.',
                '',
                `Lauf: ${new Date().toISOString()} · [Workflow-Log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
              ];
              for (const r of actionable) {
                lines.push(`### \`${r.id}\``);
                for (const u of (r.changed || [])) {
                  lines.push(`- ✏️ geändert (Re-Extraktion prüfen): ${u}`);
                  const ex = (r.excerpts || {})[u];
                  if (withExcerpts && ex) {
                    lines.push('', '  ```diff');
                    for (const l of ex.split('\n')) lines.push(`  ${l}`);
                    lines.push('  ```', '');
                  }
                }
                for (const u of (r.dead || [])) lines.push(`- ❌ toter Link: ${u}`);
                lines.push('');
              }
              lines.push('**Nächster Schritt je Leistung:** `tessera run --id <leistung>` erneut ausführen,');
              lines.push('den Draft-PR gegen `maschinerie-zuerich` prüfen, danach `tessera fingerprint --id <leistung>`');
              lines.push('committen (aktualisiert die Baseline). Dieses Issue schliesst sich beim nächsten grünen Lauf selbst.');
              return lines.join('\n');
            };
            let body = buildBody(true);
            if (body.length > 60000) body = buildBody(false);

            // Label sicherstellen (idempotent).
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: LABEL });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: LABEL,
                color: 'fbca04', description: 'Quellseite hat sich geändert — Re-Extraktion prüfen',
              });
            }

            if (openIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: openIssue.number, body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: openIssue.number,
                body: `Aktualisiert durch Lauf ${new Date().toISOString()} (${actionable.length} Leistung(en) betroffen).`,
              });
              core.info(`Issue #${openIssue.number} aktualisiert.`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title: TITLE, body, labels: [LABEL],
              });
              core.info(`Issue #${created.data.number} angelegt.`);
            }
