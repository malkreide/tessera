name: contract-check

# Prueft Prozess-JSONs gegen den Datenvertrag. Reine Python-stdlib,
# daher kein Dependency-Install noetig.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Vertrags-Check (Fixtures + Erwartungen)
        run: python tests/run_checks.py
      - name: Vertrags-Feld-Allowlist-Tests (additive Felder, stdlib)
        run: python tests/test_contract_fields.py
      - name: Grounding-Gate-Tests (stdlib)
        run: python tests/test_grounding.py
      - name: Preflight-Gate-Tests (Frische + robots-Sperre, stdlib)
        run: python tests/test_preflight_gate.py
      - name: Pipeline-Integrationstest (extract->ground->validate, key-/netzfrei)
        run: python tests/test_pipeline_integration.py
      - name: Bindewert-Tests (Label<->Wert-Heuristik, stdlib)
        run: python tests/test_binding.py
      - name: Re-Verifikations-Tests (Link-Rot + Drift, stdlib)
        run: python tests/test_verify.py
      - name: Merge-Tests (Handdaten erhalten, stdlib)
        run: python tests/test_merge.py
      - name: Hochrisiko-Tests (erhoehter Review, stdlib)
        run: python tests/test_risk.py
      - name: Aenderungs-Diff-Tests (Fingerprint/Diff, stdlib)
        run: python tests/test_diff.py
