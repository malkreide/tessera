# Kuratierte Prozessliste fuer tessera v1 — VON HAND gepflegt.
# Es gibt KEINEN Discovery-Agenten; neue Leistungen werden hier manuell ergaenzt.
#
# v1 startet bewusst mit rechtlich risikoarmen Leistungen (hund-anmelden,
# umzug-melden). Ab v2 ist als bewusste Ausnahme EIN Hochrisiko-Fall
# (veranstaltung) mit maximalem Gate freigeschaltet — erhoehter Review, nur als
# Draft-PR, Merge ausschliesslich durch einen Menschen. baugesuch und sozialhilfe
# bleiben ausgeschlossen (existenzielles bzw. streitanfaelligstes Risiko).
#
# Felder:
#   id                kebab-case, identisch zur lebenslage_ref in der Maschinerie
#   service_name      offizieller Name der Leistung
#   target_audience   eCH-0073: bevoelkerung | wirtschaft | behoerden
#   official_urls     exakte Quell-URLs — am 2026-06-11 manuell auf HTTP 200 geprueft
#   catalog_keywords  Stichwoerter fuer den Abdeckungs-Abgleich (I14Y / eCH-0070)
#   notes             Hinweise fuer Reviewer:innen

catalog:
  # I14Y Public API (Behoerdenleistungen, ohne Auth) — wird KONSUMIERT, nicht entdeckt.
  i14y_publicservices_url: "https://api.i14y.admin.ch/api/public/v1/publicservices"
  # eCH-0070 Leistungsinventar (Beilage 1, V4.2.0) als XLSX.
  ech0070_inventory_url: "https://www.ech.ch/sites/default/files/imce/eCH-Dossier/0061-0090/eCH-0070/4.2.0/Beilagen/BEIL1_d%26f_eCH-0070_V4.2.0_Leistungsinventar.xlsx"

crawler:
  # Identifizierender User-Agent (Pflicht laut CLAUDE.md / Pre-Flight).
  user_agent: "tessera/0.1 (+https://github.com/malkreide/tessera; offene Prozess-Extraktion; Kontakt via GitHub-Issues)"
  # Rate-Limit: Pause zwischen zwei Requests in Sekunden.
  delay_seconds: 2.0

processes:
  - id: hund-anmelden
    service_name: "Hund anmelden / Hundekontrolle"
    target_audience: bevoelkerung
    official_urls:
      - "https://www.stadt-zuerich.ch/de/stadtleben/veranstaltungen-und-bewilligungen/hundekontrolle.html"
      - "https://www.stadt-zuerich.ch/de/stadtleben/veranstaltungen-und-bewilligungen/hundekontrolle/anmeldung.html"
      - "https://www.zh.ch/de/umwelt-tiere/tiere/haustiere-heimtiere/hunde.html"
    catalog_keywords: ["hund"]
    notes: >-
      Einfacher Fall, Einstieg fuer v1. Kantonale Meldefrist und Hundesteuer
      duerfen NUR als references (Label + Deep-Link + woertliches Zitat)
      erscheinen, nie als Wert in einem Schritt-Label.

  - id: umzug-melden
    service_name: "Umzug melden (Zuzug, Umzug, Wegzug)"
    target_audience: bevoelkerung
    official_urls:
      - "https://www.stadt-zuerich.ch/de/lebenslagen/einwohner-services/umziehen-melden.html"
      - "https://www.stadt-zuerich.ch/de/lebenslagen/einwohner-services/umziehen-melden/zuzug.html"
      - "https://www.stadt-zuerich.ch/de/lebenslagen/einwohner-services/umziehen-melden/umzug.html"
      - "https://www.stadt-zuerich.ch/de/lebenslagen/einwohner-services/umziehen-melden/wegzug.html"
    catalog_keywords: ["umzug", "zuzug", "wegzug", "adress"]
    notes: >-
      Meldefristen vorhanden — ausschliesslich als references verlinken.
      Die Lebenslage umfasst Zuzug, Umzug innerhalb der Stadt und Wegzug.

  - id: fundsache
    service_name: "Fundsache / Fundbüro (etwas verloren oder gefunden)"
    target_audience: bevoelkerung
    official_urls:
      # Am 2026-06-28 manuell auf HTTP 200 geprueft. Kanonischer Prozess nutzt
      # dieselbe source_url (VBZ-Fundbuero). Akteure dort: person, fundbuero.
      - "https://www.stadt-zuerich.ch/vbz/de/beratung-service/fundbuero.html"
      - "https://www.stadt-zuerich.ch/vbz/de/beratung-service/fundbuero/verloren.html"
      - "https://www.stadt-zuerich.ch/vbz/de/beratung-service/fundbuero/gefunden.html"
      - "https://www.stadt-zuerich.ch/vbz/de/beratung-service/fundbuero/versteigerung.html"
      - "https://www.stadt-zuerich.ch/vbz/de/beratung-service/fundbuero/rechtsgrundlage.html"
    catalog_keywords: ["fund", "fundsache", "fundbüro", "verloren"]
    notes: >-
      Risikoarm, aber gebuehren-/fristbehaftet: Fundbuero-Gebuehr,
      Express-Zuschlag, Aufbewahrungsfrist, Finderlohn-Anspruch — alle NUR als
      references (Label ohne Zahl + Deep-Link + woertliches Zitat), nie als Wert
      im Schritt-Label. Bestehende Zieldatei hat actors[] (person, fundbuero) ->
      Actor-Abgleich greift; unbekannte Rollen werden im PR geflaggt.

  - id: parkplatz
    service_name: "Anwohnerparkkarte (Parkbewilligung in der blauen Zone)"
    target_audience: bevoelkerung
    official_urls:
      # Am 2026-06-28 manuell auf HTTP 200 geprueft. Kanonischer Prozess nutzt
      # parkbewilligungen.html als source_url; Akteure dort: halter, dav, stapo,
      # statthalter. Die AGB-Seite traegt Gebuehren + Rekurs-/Rechtsgrundlage.
      - "https://www.stadt-zuerich.ch/de/mobilitaet/parkieren/parkbewilligungen.html"
      - "https://www.stadt-zuerich.ch/de/mobilitaet/parkieren/parkbewilligungen/anwohnerparkkarte.html"
      - "https://www.stadt-zuerich.ch/de/mobilitaet/parkieren/parkbewilligungen/anwohnerparkkarte/antragsformular-ap-privatpersonen.html"
      - "https://www.stadt-zuerich.ch/de/mobilitaet/parkieren/rechtliche-grundlagen/agb.html"
    catalog_keywords: ["park", "parkkarte", "parkbewilligung", "anwohner"]
    notes: >-
      Risikoarm, aber gebuehren- und rekursbehaftet: Parkkarten-Gebuehr und
      Rekursfrist NUR als references (Label ohne Zahl + Deep-Link + woertliches
      Zitat), nie als Wert im Schritt-Label. Bestehende Zieldatei hat actors[]
      (halter, dav, stapo, statthalter) -> Actor-Abgleich greift; unbekannte
      Rollen werden im PR geflaggt. Rekurs ist Teil des Prozesses, aber
      parkplatz ist KEIN Hochrisiko-Fall (anders als baugesuch/sozialhilfe).

  - id: kita-platz
    service_name: "Kita-Platz / Betreuungsgutschein (subventionierte Kinderbetreuung)"
    target_audience: bevoelkerung
    official_urls:
      # Am 2026-06-28 manuell auf HTTP 200 geprueft. Kanonischer Prozess nutzt
      # betreuungskosten-und-subventionen.html als source_url; Akteure dort:
      # eltern, kita, schulamt, sozialdept, bezirksrat.
      - "https://www.stadt-zuerich.ch/de/lebenslagen/jugend-und-familie/fruehe-kindheit/familienergaenzende-kinderbetreuung/betreuungskosten-und-subventionen.html"
      - "https://www.stadt-zuerich.ch/de/lebenslagen/jugend-und-familie/fruehe-kindheit/familienergaenzende-kinderbetreuung/kitaplatz-finden.html"
      - "https://www.stadt-zuerich.ch/de/lebenslagen/jugend-und-familie/fruehe-kindheit/familienergaenzende-kinderbetreuung/faq.html"
    catalog_keywords: ["kita", "betreuung", "betreuungsgutschein", "kinderbetreuung"]
    notes: >-
      Einkommensabhaengig -> SENSIBEL. Struktur-only bleibt zwingend: keine
      personenbezogenen Daten, keine Einkommensgrenzen/Subventionsbetraege als
      Wert im Label — Betraege/Anspruchsgrenzen NUR als references (Label ohne
      Zahl + Deep-Link + woertliches Zitat). Bestehende Zieldatei hat actors[]
      (eltern, kita, schulamt, sozialdept, bezirksrat) -> Actor-Abgleich greift.
      Rekurs (Bezirksrat) ist Teil des Prozesses; kita-platz ist KEIN
      Hochrisiko-Fall im Sinne der Registry (anders als sozialhilfe), aber beim
      Review besonders auf die Kardinalregel und Belegbarkeit achten.

  - id: veranstaltung
    service_name: "Veranstaltung auf oeffentlichem Grund (Bewilligung)"
    target_audience: bevoelkerung
    official_urls:
      # Am 2026-07-03 manuell auf HTTP 200 geprueft. HOCHRISIKO-Fall (Registry
      # src/tessera/risk.py). Erste URL = source_url; sie stimmt mit der
      # source_url der handmodellierten Zieldatei (veranstaltungen.html) ueberein.
      # Akteure in der Zieldatei: veranstalter, stapo-bew, fachstellen, statthalter.
      - "https://www.stadt-zuerich.ch/de/stadtleben/veranstaltungen-und-bewilligungen/veranstaltungen.html"
      - "https://www.stadt-zuerich.ch/de/stadtleben/veranstaltungen-und-bewilligungen/veranstaltungen/fest-sportveranstaltung-quartierfest.html"
      - "https://www.stadt-zuerich.ch/de/stadtleben/veranstaltungen-und-bewilligungen/veranstaltungen/infrastruktur-sicherheit.html"
    catalog_keywords: ["veranstaltung", "bewilligung", "anlass", "fest"]
    notes: >-
      HOCHRISIKO — bewusst als einzige Ausnahme freigeschaltet (Draft-PR, Merge
      nur durch Menschen). Erhoehter Gate greift automatisch (risk.py): JEDE
      bindende Reference (Vorlauffrist, Gebuehr, Auflagen, Rekursfrist) muss
      `verifiziert` UND woertlich belegt sein — eine ungrounded bindende
      Reference ist hier ein Validator-FEHLER, kein Hinweis. Die Vorlauffrist
      «spaetestens vier Wochen vor dem Veranstaltungsbeginn» ist auf der
      fest-sportveranstaltung-quartierfest-Seite belegbar und darf NUR als
      Reference (Label ohne Zahl + Deep-Link + Zitat) erscheinen, nie als Wert im
      Schritt-Label. Bestehende handmodellierte Zieldatei traegt actors[]
      (veranstalter, stapo-bew, fachstellen, statthalter) und
      `disclaimer_key: Prozesse.disclaimerHochrisiko` -> Actor-Abgleich greift,
      der Hochrisiko-Disclaimer wird erwartet. Unbekannte Rollen werden im PR
      geflaggt, nicht geraten.

# NICHT freigeschaltet: baugesuch (Baubewilligung), sozialhilfe — beide bleiben
# bewusst von der Automatik ausgeschlossen (hoechstes bzw. existenzielles Risiko).
# veranstaltung ist als einzige Hochrisiko-Ausnahme aktiv (siehe oben). Weitere
# Leistungen nur nach Rueckfrage.
